<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Attendly — Settings</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-mark">A</span>
      <span class="logo-text">Attendly</span>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-link">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Dashboard
      </a>
      <a href="prof.html" class="nav-link">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Professors
      </a>
      <a href="student.html" class="nav-link">
        <svg viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        Students
      </a>
      <a href="settings.html" class="nav-link active">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Settings
      </a>
    </nav>
    <a href="logout.html" class="nav-link logout-link">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Log Out
    </a>
  </aside>

  <div class="main-wrapper">
    <header class="topbar">
      <div class="topbar-title">Settings</div>
      <div class="topbar-right">
        <div class="search-box">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="globalSearch" placeholder="Search…" />
        </div>
        <button class="notif-btn" id="notifBtn">
          <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
          <span class="notif-badge" id="notifBadge">3</span>
        </button>
        <div class="notif-dropdown" id="notifDropdown">
          <div class="notif-header">Notifications</div>
          <ul id="notifList"><li class="notif-loading">Loading…</li></ul>
        </div>
      </div>
    </header>

    <main class="content">
      <div class="settings-layout">

        <!-- Admin Profile -->
        <div class="settings-section">
          <h3>Admin Profile</h3>
          <div class="settings-card">
            <div class="form-row">
              <div class="form-group">
                <label>Full Name</label>
                <input type="text" value="Admin User" id="adminName" />
              </div>
              <div class="form-group">
                <label>Email</label>
                <input type="email" value="admin@attendly.com" id="adminEmail" />
              </div>
            </div>
            <button class="btn-save" id="saveProfile">Save Changes</button>
          </div>
        </div>

        <!-- Change Password -->
        <div class="settings-section">
          <h3>Change Password</h3>
          <div class="settings-card">
            <div class="form-row">
              <div class="form-group">
                <label>Current Password</label>
                <input type="password" id="currentPwd" placeholder="••••••••" />
              </div>
              <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPwd" placeholder="••••••••" />
              </div>
            </div>
            <button class="btn-save" id="changePwd">Update Password</button>
            <p class="settings-msg" id="pwdMsg"></p>
          </div>
        </div>

        <!-- Preferences -->
        <div class="settings-section">
          <h3>Preferences</h3>
          <div class="settings-card">
            <div class="pref-row">
              <span>Email Notifications</span>
              <div class="toggle active" id="toggleEmail"></div>
            </div>
            <div class="pref-row">
              <span>Show Attendance Alerts</span>
              <div class="toggle active" id="toggleAlerts"></div>
            </div>
            <div class="pref-row">
              <span>Dark Mode (coming soon)</span>
              <div class="toggle" id="toggleDark"></div>
            </div>
          </div>
        </div>

        <!-- Danger zone -->
        <div class="settings-section">
          <h3>Account</h3>
          <div class="settings-card danger-zone">
            <p>Logging out will end your current admin session.</p>
            <a href="logout.html" class="btn-danger">Log Out</a>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script type="module" src="js/script.js"></script>
</body>
</html>
